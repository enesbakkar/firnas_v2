name: Build Rutin Tracker APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Rutin APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: rutin/package-lock.json

      - name: Install Dependencies
        run: |
          cd rutin
          npm install

      - name: Prepare Web Assets
        run: |
          cd rutin
          mkdir -p www
          cp index.html style.css app.js www/

      - name: Initialize Capacitor & Add Android
        run: |
          cd rutin
          npx cap add android

      - name: Sync Capacitor
        run: |
          cd rutin
          npx cap sync android

      - name: Generate App Assets (Icons & Splash)
        run: |
          cd rutin
          npx @capacitor/assets generate --android

      - name: Build APK with Gradle
        run: |
          cd rutin/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rutin-Tracker-APK
          path: rutin/android/app/build/outputs/apk/debug/app-debug.apk
