<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=/" />
    <script>
        window.location.replace("/");
    </script>
    <title>404 - Sayfa Bulunamadı | Firnas Technologies</title>
    <link rel="icon" type="image/png" href="/asset/firnas_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { 
            background: #051421; 
            background-image: radial-gradient(rgba(0, 184, 212, 0.05) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            color: #ffffff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            text-align: center; 
            font-family: 'Inter', sans-serif;
        }
        .error-container { 
            max-width: 600px; 
            padding: 3rem; 
            background: rgba(5, 20, 33, 0.75);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 184, 212, 0.18);
            border-radius: 32px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }
        .error-code { 
            font-family: 'Outfit', sans-serif; 
            font-size: 8rem; 
            font-weight: 900; 
            background: linear-gradient(90deg, #ffffff 0%, #00b8d4 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin: 0 0 1rem 0; 
            line-height: 1; 
            filter: drop-shadow(0 0 15px rgba(0, 184, 212, 0.3)); 
        }
        .error-title { 
            font-family: 'Outfit', sans-serif; 
            font-size: 2rem; 
            margin-bottom: 1rem; 
            color: #ffffff; 
        }
        .error-desc { 
            font-size: 1.1rem; 
            color: #94a3b8; 
            margin-bottom: 2.5rem; 
            line-height: 1.6;
        }
        .btn-home { 
            display: inline-block; 
            padding: 1rem 2.5rem; 
            background: #00b8d4; 
            color: #fff; 
            font-weight: 700; 
            border-radius: 14px; 
            text-decoration: none; 
            transition: all 0.3s ease; 
            box-shadow: 0 0 20px rgba(0, 184, 212, 0.4); 
        }
        .btn-home:hover { 
            background: #00e5ff; 
            transform: translateY(-3px); 
            box-shadow: 0 0 30px rgba(0, 184, 212, 0.6); 
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Sinyal Kaybedildi</h2>
        <p class="error-desc">Aradığınız sayfa taşınmış, silinmiş veya geçerliliğini yitirmiş olabilir. Lütfen güvenli bir rotaya yönelin.</p>
        <a href="/" class="btn-home">Ana Sayfaya Dön</a>
    </div>
</body>
</html>
