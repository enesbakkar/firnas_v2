<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firnas Technologies | Bu Site Geçici Olarak Kullanım Dışı</title>
    <link rel="icon" type="image/png" href="/asset/firnas_logo.png">
    <link rel="shortcut icon" type="image/png" href="/asset/firnas_logo.png">
    <link rel="apple-touch-icon" href="/asset/firnas_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #030b13;
            --card-bg: rgba(9, 27, 44, 0.75);
            --card-border: rgba(0, 184, 212, 0.18);
            --accent-cyan: #00b8d4;
            --accent-cyan-bright: #00e5ff;
            --accent-glow: rgba(0, 184, 212, 0.35);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(0, 184, 212, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(0, 229, 255, 0.06) 0%, transparent 45%),
                radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 28px 28px;
            padding: 2rem 1rem;
        }

        .ambient-orb {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: pulse-orb 8s ease-in-out infinite alternate;
        }

        @keyframes pulse-orb {
            0% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.8; }
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            text-align: center;
        }

        .logo-wrapper {
            margin-bottom: 2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            backdrop-filter: blur(12px);
        }

        .logo-img {
            height: 48px;
            width: auto;
            filter: drop-shadow(0 0 10px rgba(0, 184, 212, 0.4));
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: rgba(245, 158, 11, 0.12);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 30px;
            color: #fbbf24;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #fbbf24;
            border-radius: 50%;
            box-shadow: 0 0 10px #fbbf24;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .headline {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: -0.03em;
            margin-bottom: 1.25rem;
            background: linear-gradient(135deg, #ffffff 30%, var(--accent-cyan-bright) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .subtext {
            font-size: 1.125rem;
            color: var(--text-muted);
            line-height: 1.65;
            max-width: 600px;
            margin: 0 auto 3rem auto;
            font-weight: 400;
        }

        .footer-text {
            font-size: 0.85rem;
            color: #64748b;
        }

        @media (max-width: 640px) {
            .headline {
                font-size: 2.2rem;
            }
            .subtext {
                font-size: 1rem;
            }
            .main-container {
                padding: 0 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-orb"></div>

    <main class="main-container">
        <div class="logo-wrapper">
            <img src="/asset/firnas_logo.png" alt="Firnas Technologies" class="logo-img">
            <span class="brand-name">Firnas Technologies</span>
        </div>

        <div>
            <span class="status-pill">
                <span class="status-dot"></span> Bakım & Güncelleme Modu
            </span>
        </div>

        <h1 class="headline">Bu Site Geçici Olarak Kullanım Dışı</h1>

        <p class="subtext">
            Firnas Technologies web sitesi altyapı ve sistem güncellemeleri nedeniyle geçici bir süre için erişime kapatılmıştır.
        </p>

        <footer class="footer-text">
            &copy; 2026 Firnas Technologies. Tüm hakları saklıdır.
        </footer>
    </main>

</body>
</html>
