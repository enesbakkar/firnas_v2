<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firnas Technologies | Bu Site Geçici Olarak Kullanım Dışı</title>
    <link rel="icon" type="image/png" href="/asset/firnas_logo.png">
    <link rel="shortcut icon" type="image/png" href="/asset/firnas_logo.png">
    <link rel="apple-touch-icon" href="/asset/firnas_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #030b13;
            --card-bg: rgba(9, 27, 44, 0.65);
            --card-border: rgba(0, 184, 212, 0.25);
            --accent-cyan: #00b8d4;
            --accent-cyan-bright: #00e5ff;
            --accent-glow: rgba(0, 184, 212, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(0, 184, 212, 0.12) 0%, transparent 60%),
                radial-gradient(circle at 85% 85%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
                radial-gradient(rgba(0, 184, 212, 0.15) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 32px 32px;
            padding: 2rem 1.5rem;
        }

        .ambient-orb {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: pulse-orb 6s ease-in-out infinite alternate;
        }

        @keyframes pulse-orb {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.4; }
            100% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.75; }
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan-bright), transparent);
            opacity: 0.4;
            animation: scan 8s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes scan {
            0% { top: -5%; }
            100% { top: 105%; }
        }

        .main-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 920px;
            margin: 0 auto;
            text-align: center;
        }

        .logo-wrapper {
            margin-bottom: 2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 12px 28px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(0, 184, 212, 0.25);
            border-radius: 50px;
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(0, 184, 212, 0.1);
            transition: transform 0.3s ease;
        }

        .logo-wrapper:hover {
            transform: translateY(-2px);
            border-color: var(--accent-cyan-bright);
        }

        .logo-img {
            height: 52px;
            width: auto;
            filter: drop-shadow(0 0 12px rgba(0, 184, 212, 0.6));
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .hero-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 3.5rem 2.5rem;
            backdrop-filter: blur(24px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            animation: floatCard 6s ease-in-out infinite alternate;
        }

        @keyframes floatCard {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }

        .hero-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan-bright), transparent);
            animation: lineMove 4s linear infinite;
        }

        @keyframes lineMove {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 22px;
            background: rgba(245, 158, 11, 0.12);
            border: 1px solid rgba(245, 158, 11, 0.35);
            border-radius: 30px;
            color: #fbbf24;
            font-size: 0.875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 2rem;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.15);
        }

        .status-dot {
            width: 9px;
            height: 9px;
            background-color: #fbbf24;
            border-radius: 50%;
            box-shadow: 0 0 12px #fbbf24;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.85); }
        }

        .headline {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4.2vw, 3.1rem);
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            white-space: normal;
            word-break: keep-all;
            background: linear-gradient(120deg, #ffffff 0%, #00e5ff 30%, #ffffff 60%, #00b8d4 85%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 5s linear infinite;
            text-shadow: 0 0 30px rgba(0, 184, 212, 0.3);
        }

        @keyframes shineText {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .icon-floating {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: rgba(0, 184, 212, 0.12);
            border: 1px solid rgba(0, 184, 212, 0.3);
            color: var(--accent-cyan-bright);
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 25px rgba(0, 184, 212, 0.3);
            animation: pulseIcon 3s ease-in-out infinite alternate;
        }

        @keyframes pulseIcon {
            0% { transform: scale(1) rotate(0deg); box-shadow: 0 0 20px rgba(0, 184, 212, 0.2); }
            100% { transform: scale(1.08) rotate(5deg); box-shadow: 0 0 35px rgba(0, 229, 255, 0.5); }
        }

        .subtext {
            font-size: 1.15rem;
            color: var(--text-muted);
            line-height: 1.75;
            max-width: 640px;
            margin: 0 auto;
            font-weight: 400;
        }

        .footer-text {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: #64748b;
            letter-spacing: 0.02em;
        }

        @media (max-width: 640px) {
            .hero-card {
                padding: 2.5rem 1.25rem;
                border-radius: 24px;
            }
            .headline {
                font-size: 1.75rem;
            }
            .subtext {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-orb"></div>
    <div class="scanline"></div>

    <main class="main-container">
        <div class="logo-wrapper">
            <img src="/asset/firnas_logo.png" alt="Firnas Technologies" class="logo-img">
            <span class="brand-name">Firnas Technologies</span>
        </div>

        <div class="hero-card">
            <div class="icon-floating">
                <i class="fas fa-layer-group"></i>
            </div>

            <div>
                <span class="status-pill">
                    <span class="status-dot"></span> Bakım & Güncelleme Modu
                </span>
            </div>

            <h1 class="headline">Bu Site Geçici Olarak Kullanım Dışı</h1>

            <p class="subtext">
                Firnas Technologies web sitesi altyapı ve sistem güncellemeleri nedeniyle geçici bir süre için erişime kapatılmıştır.
            </p>
        </div>

        <footer class="footer-text">
            &copy; 2026 Firnas Technologies. Tüm hakları saklıdır.
        </footer>
    </main>

</body>
</html>
